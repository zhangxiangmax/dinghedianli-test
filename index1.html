<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>鼎合电力新入驻小区内部测评</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #e9f1f6;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .step-card {
            max-width: 750px;
            width: 100%;
            background: #ffffff;
            border-radius: 42px;
            box-shadow: 0 25px 45px -12px #1f4b66;
            padding: 32px 32px 40px;
            transition: 0.2s;
        }
        h1 {
            font-size: 2rem;
            font-weight: 650;
            color: #0b3445;
            margin: 0 0 6px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1::before {
            content: '??';
            font-size: 2.2rem;
        }
        .progress-indicator {
            background: #d4e7f3;
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0 25px 0;
            font-weight: 550;
            color: #10516e;
            border: 1px solid #9bc1db;
            font-size: 1.2rem;
        }
        .question-panel {
            background: #f6fbfe;
            border: 2px solid #cbe1f0;
            border-radius: 40px;
            padding: 30px 30px;
            margin: 15px 0 30px;
            box-shadow: inset 0 1px 5px #eef7ff, 0 10px 15px -10px #1f5370;
        }
        .q-text {
            font-size: 1.7rem;
            font-weight: 600;
            color: #093f55;
            margin-bottom: 32px;
            line-height: 1.3;
        }
        .options-step {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option-step-item {
            background: white;
            border: 2px solid #bed9ee;
            border-radius: 60px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.1s, border 0.1s, transform 0.1s;
            box-shadow: 0 4px 8px rgba(25, 95, 130, 0.05);
        }
        .option-step-item:hover {
            background: #e4f2fc;
            border-color: #56a5cf;
            transform: scale(1.01);
        }
        .option-step-item.selected {
            background: #d2ebfc;
            border-color: #1376a3;
            box-shadow: 0 8px 14px #91c2df;
        }
        .option-step-item input[type="radio"] {
            width: 22px;
            height: 22px;
            accent-color: #166f99;
            margin-right: 20px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .option-label {
            font-size: 1.25rem;
            font-weight: 550;
            color: #124f6a;
            flex: 1;
        }
        .nav-buttons {
            display: flex;
            gap: 20px;
            justify-content: space-between;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: white;
            border: 2.5px solid #196886;
            color: #196886;
            font-weight: 700;
            font-size: 1.25rem;
            padding: 14px 35px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 5px 12px #aac9df;
            min-width: 150px;
        }
        .nav-btn:hover:not(:disabled) {
            background: #e2f0fa;
            border-color: #0d5270;
            transform: translateY(-3px);
            box-shadow: 0 15px 20px -8px #1a607d;
        }
        .nav-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 3px 6px;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            border-color: #98b8cf;
            cursor: not-allowed;
            background: #eaf1f7;
        }
        .reset-mini {
            background: transparent;
            border: 2px solid #2c6e8f;
            color: #1f5f7e;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
        }
        .reset-mini:hover {
            background: #d9eefc;
        }
        .final-result {
            background: #deedf7;
            border-radius: 40px;
            padding: 22px 30px;
            margin: 20px 0 0;
            text-align: center;
            border: 2px solid #86bedc;
        }
        .final-verdict {
            font-size: 1.8rem;
            font-weight: 650;
            background: #166f99;
            display: inline-block;
            padding: 12px 45px;
            border-radius: 60px;
            color: white;
            margin-top: 15px;
        }
        /* 隐藏下一题按钮 */
        #nextBtn {
            display: none;
        }
    </style>
</head>
<body>
<div class="step-card" id="stepCard">
    <h1>鼎合电力充电桩新入驻小区内部测评</h1>

    <!-- 进度指示固定文本 -->
    <div class="progress-indicator" id="stepCounter">仅供公司内部测试用，共9题</div>

    <!-- 动态题目渲染区 -->
    <div id="questionPanel" class="question-panel"></div>

    <!-- 导航按钮组：上一题、重选此题 -->
    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn" disabled>? 上一题</button>
        <button class="nav-btn reset-mini" id="resetStepBtn">? 重选此题</button>
        <button class="nav-btn" id="nextBtn" style="display:none;">下一题 ?</button>
    </div>

    <!-- 最终结果面板（初始隐藏） -->
    <div id="finalPanel" style="display: none;" class="final-result">
        <div style="font-size:1.5rem; color:#115472;">测评完成</div>
        <div class="final-verdict" id="finalVerdict"></div>
        <button class="nav-btn reset-mini" id="restartBtn" style="margin-top:25px; padding:12px 40px;">重新测试</button>
    </div>
</div>

<script>
    (function() {
        // ----- 最新题目数据（9题）-----
        const questions = [
            { text: "1. 这个小区是新小区还是老小区？", options: ["新小区", "老小区"], scores: [-1, 2] },
            { text: "2. 这个小区以多层为主还是高层为主？", options: ["多层", "高层多层混合", "纯高层"], scores: [-1, 1, 2] },
            { text: "3. 这个小区需不需要建普通车棚？", options: ["需要", "不需要"], scores: [-1, 1] },
            { text: "4. 小区物业有没有其它额外要求？（如平整地面、画车位、装路灯等）", options: ["有", "没有"], scores: [-0.5, 0.5] },
            { text: "5. 入驻后是否垄断小区充电业务？", options: ["是", "不是"], scores: [2, 0] },
            { text: "6. 小区内现有电价如何？", options: ["低", "中", "高", "无"], scores: [0, 0.5, 1, 0.5] },
            { text: "7. 小区目前入住率如何？", options: ["低", "中", "高"], scores: [0, 0.5, 1] },
            { text: "8. 除去基本电费外，每度电物业额外收取多少服务费?", options: ["不收费", "1毛以下", "1至2毛", "2毛以上"], scores: [2, 1.5, 1, 0.5] },
            { text: "9. 小区内施工条件如何？", options: ["有车棚有主线", "有车棚无主线", "无车棚无主线"], scores: [1, 0, -1] }
        ];
        const TOTAL_QS = questions.length; // 9题

        let currentIndex = 0;
        let answers = new Array(TOTAL_QS).fill(null);

        const panel = document.getElementById('questionPanel');
        const stepCounter = document.getElementById('stepCounter'); // 固定文本
        const prevBtn = document.getElementById('prevBtn');
        const resetStepBtn = document.getElementById('resetStepBtn');
        const finalPanel = document.getElementById('finalPanel');
        const finalVerdict = document.getElementById('finalVerdict');
        const restartBtn = document.getElementById('restartBtn');

        // 计算总分
        function computeTotal() {
            let total = 0;
            for (let i = 0; i < TOTAL_QS; i++) {
                if (answers[i] !== null) {
                    total += questions[i].scores[answers[i]];
                }
            }
            return total;
        }

        // 检查是否所有题都答了
        function allAnswered() {
            return answers.every(idx => idx !== null);
        }

        // 渲染当前题目
        function renderCurrentQuestion() {
            const q = questions[currentIndex];
            const selectedIdx = answers[currentIndex];

            let html = `<div class="q-text">${q.text}</div>`;
            html += `<div class="options-step">`;

            q.options.forEach((opt, optIdx) => {
                const checkedAttr = (selectedIdx === optIdx) ? 'checked' : '';
                html += `
                    <label class="option-step-item ${selectedIdx === optIdx ? 'selected' : ''}">
                        <input type="radio" name="currentQ" value="${optIdx}" ${checkedAttr}>
                        <span class="option-label">${opt}</span>
                    </label>
                `;
            });
            html += `</div>`;
            panel.innerHTML = html;

            // 绑定change事件：自动保存并跳转
            const radios = document.querySelectorAll('input[name="currentQ"]');
            radios.forEach(radio => {
                radio.addEventListener('change', function(e) {
                    const optIdx = parseInt(this.value);
                    if (!isNaN(optIdx)) {
                        answers[currentIndex] = optIdx;

                        if (allAnswered()) {
                            showFinalResult();
                        } else {
                            if (currentIndex < TOTAL_QS - 1) {
                                currentIndex++;
                                renderCurrentQuestion();
                            }
                        }
                    }
                });
            });

            // 固定提示文本不变
            stepCounter.innerText = '仅供公司内部测试用，共9题';
            prevBtn.disabled = (currentIndex === 0);
        }

        // 上一题
        function goPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCurrentQuestion();
            }
        }

        // 重选当前题
        function resetCurrent() {
            answers[currentIndex] = null;
            renderCurrentQuestion();
        }

        // 显示最终结果
        function showFinalResult() {
            if (!allAnswered()) {
                // 理论上不会发生，但保险处理
                for (let i = 0; i < TOTAL_QS; i++) {
                    if (answers[i] === null) {
                        currentIndex = i;
                        renderCurrentQuestion();
                        return;
                    }
                }
                return;
            }

            panel.style.display = 'none';
            document.querySelector('.nav-buttons').style.display = 'none';
            finalPanel.style.display = 'block';

            const total = computeTotal();

            let verdictText = '';
            let bgColor = '';
            if (total > 10) {
                verdictText = '? 此小区为优质小区，必须入驻';
                bgColor = '#1d698b'; // 深蓝
            } else if (total > 6) { // 大于6且≤10
                verdictText = '? 此小区为优质小区，建议入驻';
                bgColor = '#2f8b6f'; // 墨绿
            } else { // ≤5
                verdictText = '? 此小区评分较低，不建议入驻';
                bgColor = '#b1624b'; // 砖红
            }

            finalVerdict.innerText = verdictText;
            finalVerdict.style.background = bgColor;
        }

        // 重启测试
        function restartTest() {
            answers = new Array(TOTAL_QS).fill(null);
            currentIndex = 0;

            panel.style.display = 'block';
            document.querySelector('.nav-buttons').style.display = 'flex';
            finalPanel.style.display = 'none';

            renderCurrentQuestion();
        }

        // 初始化
        renderCurrentQuestion();

        // 绑定按钮事件
        prevBtn.addEventListener('click', goPrev);
        resetStepBtn.addEventListener('click', resetCurrent);
        restartBtn.addEventListener('click', restartTest);
    })();
</script>
</body>
</html>
